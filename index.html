    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          { "@type": "Question", "name": "Ist SemBan kostenlos?", "acceptedAnswer": { "@type": "Answer", "text": "Ja, SemBan ist vollständig kostenlos – kein Abo, kein Premium. Du kannst Stundenplan, Übungsblätter, Aufgaben sowie Noten und ECTS ohne Bezahlung nutzen." } },
          { "@type": "Question", "name": "Funktioniert SemBan auch offline?", "acceptedAnswer": { "@type": "Answer", "text": "Ja. SemBan speichert eine Kopie deiner Daten direkt auf deinem Gerät und funktioniert deshalb auch offline. Die App lässt sich als PWA installieren und gleicht sich automatisch ab, sobald du wieder online bist." } },
          { "@type": "Question", "name": "Brauche ich für SemBan ein Konto?", "acceptedAnswer": { "@type": "Answer", "text": "Ja, für SemBan ist ein kostenloses Konto nötig. Damit werden deine Daten sicher in deinem persönlichen Konto gespeichert und automatisch zwischen Handy, Laptop und Tablet synchron gehalten." } },
          { "@type": "Question", "name": "Wie berechnet SemBan Notendurchschnitt und ECTS?", "acceptedAnswer": { "@type": "Answer", "text": "SemBan berechnet deinen Notendurchschnitt automatisch und summiert deine ECTS kumulativ über das gesamte Studium – Bachelor und Master getrennt. So siehst du jederzeit deinen Fortschritt zum Abschluss." } },
          { "@type": "Question", "name": "Kann ich SemBan auf dem Handy installieren?", "acceptedAnswer": { "@type": "Answer", "text": "Ja. SemBan ist eine Progressive Web App (PWA) und lässt sich über den Browser direkt auf iPhone, Android oder Desktop installieren – ganz ohne App Store." } },
          { "@type": "Question", "name": "Erinnert mich SemBan an Fristen und Abgaben?", "acceptedAnswer": { "@type": "Answer", "text": "Ja. SemBan erinnert dich rechtzeitig an anstehende Abgaben – auf Wunsch sogar, wenn die App geschlossen ist. So verpasst du keine Frist mehr, egal über wie viele Kurse sie verteilt sind." } },
          { "@type": "Question", "name": "Erstellt SemBan einen Lernplan für die Klausur?", "acceptedAnswer": { "@type": "Answer", "text": "Ja. Du gibst Klausurtermin, Kapitel, Übungs- und Tutoriumsblätter sowie Altklausuren an, und SemBan erstellt automatisch einen Lernplan über alle Kurse: verteilt auf die Wochen vor der Klausur, mit Wiederholungen im richtigen Abstand (Spaced Repetition), Fokus-Tagen statt Häppchen und Tages- sowie Wochenlimits, damit du nicht ausbrennst. Altklausuren landen als Prüfungssimulation am Ende, Karteikarten als tägliche Gewohnheit. Erledigte Einheiten bleiben erledigt – der Plan balanciert sich automatisch neu." } },
          { "@type": "Question", "name": "Was ist Spaced Repetition und nutzt SemBan es?", "acceptedAnswer": { "@type": "Answer", "text": "Spaced Repetition (verteiltes Lernen) bedeutet, Stoff in wachsenden Abständen zu wiederholen statt alles auf einmal zu lernen – das festigt das Wissen nachweislich besser. SemBan baut diese verteilten Wiederholungen automatisch in deinen Lernplan ein und plant zusätzlich tägliche Karteikarten-Zeit." } },
          { "@type": "Question", "name": "Kann ich meinen Stundenplan und Lernplan in den Kalender exportieren?", "acceptedAnswer": { "@type": "Answer", "text": "Ja. Du kannst deinen Stundenplan und deine Aufgaben als Kalender (ICS) abonnieren oder exportieren und in Google Kalender, Apple Kalender oder Outlook anzeigen. Umgekehrt kannst du einen bestehenden Stundenplan per ICS importieren." } },
          { "@type": "Question", "name": "Was ist der Unterschied zwischen SemBan und Notion?", "acceptedAnswer": { "@type": "Answer", "text": "Notion ist mächtig, aber du baust dir alles selbst zusammen und pflegst es ewig. SemBan ist fertig fürs Studium: Aufgaben, Fristen, Stundenplan, Noten und ECTS – ohne Setup, kostenlos und sofort startklar." } }
        ]
